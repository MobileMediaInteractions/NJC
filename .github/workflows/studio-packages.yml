name: NJC Studio desktop packages

on:
  workflow_dispatch:
  push:
    tags: ["studio-v*"]

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: studio-macos-arm64
          - os: windows-latest
            artifact: studio-windows-x64
          - os: ubuntu-24.04
            artifact: studio-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: pnpm studio:check
      - run: pnpm --dir tools/studio tauri build
      - run: node tools/studio/scripts/checksum-artifacts.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: tools/studio/src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 30
